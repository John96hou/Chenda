<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you go out with me?</title>
    <style>
        :root {
            --bg-color: #fceef0;
            --card-color: #ffffff;
            --primary-pink: #ff6b8b;
            --text-color: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .card {
            background: var(--card-color);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .step {
            display: none;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        .step.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #333;
        }

        /* Centered Circle Image Styling */
        img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            width: 100%;
            justify-content: center;
            height: 50px;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-yes {
            background-color: var(--primary-pink);
            color: white;
        }

        .btn-yes:hover {
            transform: scale(1.05);
            background-color: #ff5276;
        }

        .btn-no {
            background-color: #e0e0e0;
            color: #666;
            position: absolute;
            transition: all 0.1s ease;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ffe3e7;
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-color);
            box-sizing: border-box;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary-pink);
        }

        label {
            align-self: flex-start;
            font-weight: bold;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            margin-top: 15px;
        }

        .food-option {
            padding: 15px;
            border: 2px solid #ffe3e7;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .food-option:hover {
            background-color: #fff5f6;
            border-color: var(--primary-pink);
        }

        .food-option.selected {
            background-color: var(--primary-pink);
            color: white;
            border-color: var(--primary-pink);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- STEP 1: Proposal -->
        <div id="step1" class="step active">
            <img src="1.jpg" alt="Proposal Image">
            <h2>Will you go on a date with me? 🌸</h2>
            <div class="btn-container" id="proposal-buttons">
                <button class="btn-yes" onclick="nextStep(2)">YES! ✨</button>
                <button class="btn-no" id="no-button">No 😢</button>
            </div>
        </div>

        <!-- STEP 2: Shock/Success -->
        <div id="step2" class="step">
            <img src="2.jpg" alt="Reaction Image">
            <h2>WAIT YOU ACTUALLY SAID YES?! 💖</h2>
            <p>I was so ready for you to say no...</p>
            <button class="btn-yes" style="margin-top:20px;" onclick="nextStep(3)">Okay, okay! ✨</button>
        </div>

        <!-- STEP 3: Scheduler -->
        <div id="step3" class="step">
            <h2>So... when are you free? 📅</h2>
            
            <label for="date">Pick a Day</label>
            <input type="date" id="date">

            <label for="time">What Time?</label>
            <select id="time">
                <option value="">Select a time...</option>
                <option value="5:00 PM">5:00 PM — Casual coffee wrap-up</option>
                <option value="6:00 PM">6:00 PM — The right answer tbh</option>
                <option value="7:00 PM">7:00 PM — Fashionably late dinner</option>
                <option value="8:00 PM">8:00 PM — Late night dessert run</option>
            </select>

            <button class="btn-yes" style="margin-top: 25px; width: 100%;" onclick="nextStep(4)">Set the date! ✨</button>
        </div>

        <!-- STEP 4: Food Choice -->
        <div id="step4" class="step">
            <h2>What are we feeling? 🍕</h2>
            <div class="food-grid">
                <div class="food-option" onclick="selectFood(this)">Pizza 🍕</div>
                <div class="food-option" onclick="selectFood(this)">Sushi 🍣</div>
                <div class="food-option" onclick="selectFood(this)">Burgers 🍔</div>
                <div class="food-option" onclick="selectFood(this)">Ramen 🍜</div>
            </div>
            <button class="btn-yes" style="margin-top: 25px; width: 100%;" onclick="nextStep(5)">Lock it in! 👉</button>
        </div>

        <!-- STEP 5: Final Screen -->
        <div id="step5" class="step">
            <img src="3.jpg" alt="Success Image">
            <h2>Glad you didn't say no. 🥰</h2>
            <p style="font-size: 1.1rem; line-height: 1.5;">Be ready on time. <br><b>I'm coming to get you! 🚘</b></p>
        </div>
    </div>

    <script>
        function nextStep(stepNumber) {
            document.querySelectorAll('.step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById('step' + stepNumber).classList.add('active');
        }

        document.getElementById('date').valueAsDate = new Date();

        function selectFood(element) {
            element.classList.toggle('selected');
        }

        const noBtn = document.getElementById('no-button');
        const container = document.getElementById('proposal-buttons');

        function moveButton() {
            const padding = 50;
            const minX = padding;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const minY = padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            let randomX = Math.random() * (maxX - minX) + minX;
            let randomY = Math.random() * (maxY - minY) + minY;

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });
    </script>
</body>
</html>
